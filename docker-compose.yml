version: "3.9"

networks:
  adticks-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: adticks-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adticks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-adticks}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - adticks-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adticks} -d ${POSTGRES_DB:-adticks}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: adticks-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - adticks-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adticks-backend
    restart: unless-stopped
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8002
    networks:
      - adticks-network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adticks-celery-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    networks:
      - adticks-network

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adticks-celery-beat
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: celery -A app.core.celery_app beat --loglevel=info
    networks:
      - adticks-network

  flower:
    image: mher/flower
    container_name: adticks-flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379/0}
      - FLOWER_PORT=5555
    networks:
      - adticks-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adticks-frontend
    restart: unless-stopped
    ports:
      - "3002:3002"
    depends_on:
      - backend
    env_file:
      - frontend/.env.local
    networks:
      - adticks-network
