name: AdTicks Production Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install DigitalOcean CLI
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Build and Push Backend Image
        run: |
          docker build -t registry.digitalocean.com/adticks/backend:${{ github.sha }} -t registry.digitalocean.com/adticks/backend:latest ./backend
          docker push registry.digitalocean.com/adticks/backend:${{ github.sha }}
          docker push registry.digitalocean.com/adticks/backend:latest

      - name: Build and Push Frontend Image
        run: |
          docker build -t registry.digitalocean.com/adticks/frontend:${{ github.sha }} -t registry.digitalocean.com/adticks/frontend:latest ./frontend
          docker push registry.digitalocean.com/adticks/frontend:${{ github.sha }}
          docker push registry.digitalocean.com/adticks/frontend:latest

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DO_ACCESS_TOKEN,GITHUB_SHA
          script: |
            export DO_ACCESS_TOKEN=${{ secrets.DO_ACCESS_TOKEN }}
            export IMAGE_TAG=${{ github.sha }}
            cd /opt/adticks
            
            # Use the deployment script logic directly
            echo "$DO_ACCESS_TOKEN" | docker login registry.digitalocean.com --username token --password-stdin
            
            # Update docker-compose with new tags
            IMAGE_TAG=$IMAGE_TAG docker-compose -f docker-compose.prod.yml pull
            
            # Run migrations
            IMAGE_TAG=$IMAGE_TAG docker-compose -f docker-compose.prod.yml run --rm backend alembic upgrade head
            
            # Restart services
            IMAGE_TAG=$IMAGE_TAG docker-compose -f docker-compose.prod.yml up -d --no-deps backend celery_worker celery_beat frontend
            
            # Handle Nginx (since we are using host Nginx)
            # We assume the repo on the server is kept in sync or we use a temp file
            # For simplicity, we trigger the local deploy logic if scripts/deploy.sh exists on server
            chmod +x ./scripts/deploy.sh
            DEPLOY_HOST=localhost ./scripts/deploy.sh
