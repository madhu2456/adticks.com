name: Deploy AdTicks to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "🚀 Starting AdTicks deployment..."
            
            # Ensure the directory exists
            if [ ! -d "/opt/adticks" ]; then
              echo "📂 Creating /opt/adticks..."
              sudo mkdir -p /opt/adticks
              sudo chown madhu:madhu /opt/adticks
            fi

            cd /opt/adticks
            
            # Robust check for git repository
            if [ ! -d ".git" ]; then
              echo "🚀 Not a repository. Initializing..."
              # If directory is not empty, we might need to handle that, 
              # but for now we'll try to clone into current dir
              # NOTE: This may fail if repo is private and no token/key is set on server
              git clone https://github.com/${{ github.repository }}.git . || {
                echo "❌ Clone failed. If the repo is private, please clone it manually once on the server."
                exit 1
              }
            else
              echo "📥 Pulling latest code..."
              git fetch origin main
              git reset --hard origin/main
            fi
            
            # Ensure .env files exist so docker-compose doesn't crash
            echo "🔧 Checking environment files..."
            touch .env
            mkdir -p frontend
            touch frontend/.env.local

            echo "🐳 Rebuilding and starting containers..."
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build
            
            echo "⚙️ Syncing Nginx configuration..."
            if [ -f "./nginx/nginx.conf" ]; then
              sudo -n cp ./nginx/nginx.conf /etc/nginx/sites-available/adticks
              sudo -n ln -sf /etc/nginx/sites-available/adticks /etc/nginx/sites-enabled/adticks
              
              if command -v nginx >/dev/null 2>&1; then
                sudo -n /usr/sbin/nginx -t && sudo -n /bin/systemctl reload nginx
                echo "✅ Nginx reloaded"
              fi
            fi

            echo "🧹 Cleaning up..."
            docker image prune -f
            
            echo "✅ AdTicks Deployment completed!"
