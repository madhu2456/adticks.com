name: Deploy AdTicks to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install DigitalOcean CLI
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Build and Push Images
        run: |
          docker build -t registry.digitalocean.com/adticks/backend:latest ./backend
          docker build -t registry.digitalocean.com/adticks/frontend:latest ./frontend
          docker push registry.digitalocean.com/adticks/backend:latest
          docker push registry.digitalocean.com/adticks/frontend:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "🚀 Starting AdTicks deployment..."
            cd /opt/adticks
            
            echo "📥 Pulling latest code..."
            git pull origin main
            
            echo "🐳 Restarting containers..."
            # We use the prod file logic you provided
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build
            
            echo "🔄 Reloading Host Nginx..."
            if [ -f "./nginx/nginx.conf" ]; then
              sudo -n cp ./nginx/nginx.conf /etc/nginx/sites-available/adticks
              sudo -n ln -sf /etc/nginx/sites-available/adticks /etc/nginx/sites-enabled/adticks
              sudo -n /usr/sbin/nginx -t && sudo -n /bin/systemctl reload nginx
              echo "✅ Nginx reloaded"
            fi
            
            echo "✅ Deployment completed!"
