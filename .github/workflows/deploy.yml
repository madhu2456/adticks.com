name: Deploy AdTicks to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "🚀 Starting AdTicks deployment..."
            
            # Navigate to the project directory
            cd /opt/adticks
            
            echo "📥 Pulling latest code..."
            git pull origin main
            
            echo "🐳 Rebuilding and starting containers..."
            # Build on server to avoid registry issues
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build
            
            echo "🔎 Privilege diagnostics & Nginx Sync..."
            # Diagnostic and Nginx sync/reload logic similar to your example
            if [ -f "./nginx/nginx.conf" ]; then
              echo "⚙️ Updating Host Nginx configuration..."
              sudo -n cp ./nginx/nginx.conf /etc/nginx/sites-available/adticks
              sudo -n ln -sf /etc/nginx/sites-available/adticks /etc/nginx/sites-enabled/adticks
              
              if command -v nginx >/dev/null 2>&1; then
                echo "🔄 Testing and Reloading Nginx..."
                sudo -n /usr/sbin/nginx -t
                sudo -n /bin/systemctl reload nginx
                echo "✅ Nginx reloaded successfully!"
              fi
            fi

            echo "🧹 Cleaning up old Docker images..."
            docker image prune -f
            
            echo "✅ AdTicks Deployment completed!"
