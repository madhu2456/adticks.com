# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

# Upstream definitions
upstream backend {
    server 127.0.0.1:8002;
    keepalive 32;
}

upstream frontend {
    server 127.0.0.1:3002;
    keepalive 32;
}

server {
    listen 80;
    server_name adticks.com www.adticks.com;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name adticks.com www.adticks.com;

    # SSL Certificates managed by Certbot on the host
    ssl_certificate     /etc/letsencrypt/live/adticks.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adticks.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip settings (standard for host Nginx)
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # --- API proxy ---
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # --- Frontend proxy ---
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
