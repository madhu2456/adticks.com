services:
  nginx_sync:
    image: alpine:3.20
    container_name: adticks-nginx-sync
    restart: "no"
    volumes:
      - /etc/nginx/sites-enabled:/host_nginx_sites_enabled:ro
      - /etc/nginx/sites-available:/host_nginx_sites_available:ro
      - ./nginx:/sync_target
    command: >
      sh -c "mkdir -p /sync_target &&
      if [ -f /host_nginx_sites_enabled/adticks ]; then
        cp /host_nginx_sites_enabled/adticks /sync_target/adticks.conf &&
        echo 'Synced /etc/nginx/sites-enabled/adticks -> nginx/adticks.conf';
      elif [ -f /host_nginx_sites_available/adticks ]; then
        cp /host_nginx_sites_available/adticks /sync_target/adticks.conf &&
        echo 'Synced /etc/nginx/sites-available/adticks -> nginx/adticks.conf';
      else
        echo 'Skip sync: adticks config not found';
      fi"

  db:
    image: pgvector/pgvector:pg16
    container_name: adticks-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-adticks}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adticks-network

  redis:
    image: redis:7-alpine
    container_name: adticks-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adticks-network

  backend:
    build:
      context: ./backend
    container_name: adticks-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-adticks}
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379/0
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://adticks.com}
      ENVIRONMENT: production
    ports:
      - "8002:8000"
    volumes:
      - backend_data:/app/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.50'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adticks-network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://adticks.com/api}
    container_name: adticks-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://adticks.com/api}
    ports:
      - "3002:3000"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.50'
    depends_on:
      - backend
    networks:
      - adticks-network

  celery-worker:
    build:
      context: ./backend
    container_name: adticks-celery-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-adticks}
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379/0
      ENVIRONMENT: production
    volumes:
      - backend_data:/app/data
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    networks:
      - adticks-network

  prune:
    image: alpine:3.20
    container_name: adticks-prune
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "while true; do
        sleep 86400;
        docker image prune -af --filter 'until=24h';
      done"
    networks:
      - adticks-network

networks:
  adticks-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_data:
