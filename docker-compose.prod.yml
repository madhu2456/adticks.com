version: "3.9"

services:
  nginx_sync:
    image: alpine:3.20
    container_name: adticks-nginx-sync
    restart: "no"
    volumes:
      - /etc/nginx/sites-enabled:/host_nginx_sites_enabled:ro
      - /etc/nginx/sites-available:/host_nginx_sites_available:ro
      - ./nginx:/sync_target
    command: >
      sh -c "mkdir -p /sync_target &&
      if [ -f /host_nginx_sites_enabled/adticks ]; then
        cp /host_nginx_sites_enabled/adticks /sync_target/adticks.conf &&
        echo 'Synced /etc/nginx/sites-enabled/adticks -> nginx/adticks.conf';
      elif [ -f /host_nginx_sites_available/adticks ]; then
        cp /host_nginx_sites_available/adticks /sync_target/adticks.conf &&
        echo 'Synced /etc/nginx/sites-available/adticks -> nginx/adticks.conf';
      else
        echo 'Skip sync: adticks config not found';
      fi"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "1"

  db:
    image: pgvector/pgvector:pg16
    container_name: adticks-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-adticks}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - adticks-network

  redis:
    image: redis:7-alpine
    container_name: adticks-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-password}
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - adticks-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adticks-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-adticks}
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379/0
    ports:
      - "8002:8000"
    depends_on:
      nginx_sync:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - adticks-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${SITE_URL:-http://localhost:3002}/api
    container_name: adticks-frontend
    restart: unless-stopped
    env_file: ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: ${SITE_URL:-http://localhost:3002}/api
    ports:
      - "3002:3000"
    depends_on:
      nginx_sync:
        condition: service_completed_successfully
      backend:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - adticks-network

networks:
  adticks-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
